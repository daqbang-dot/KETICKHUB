<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KETICK Vault | Family Security</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/globals.css">
</head>
<body class="bg-[#0F172A] text-slate-300 font-sans h-screen flex flex-col overflow-hidden page-fade-in">

    <header class="border-b border-slate-700/50 bg-[#1E293B]/80 p-4 flex justify-between items-center text-sm backdrop-blur-sm">
        <div class="flex items-center gap-6">
            <div class="flex items-center gap-2">
                <span class="text-cyan-400 font-bold text-xl tracking-wider font-mono">KETICK_Vault</span>
            </div>
            <nav class="hidden md:flex gap-4 font-mono text-xs">
                <a href="index.html" class="text-slate-400 hover:text-emerald-400 transition-colors">[ cd .. ]</a>
                <span class="text-cyan-400 border-b border-cyan-400/50">/Encrypted_Storage</span>
            </nav>
        </div>
        <div class="flex items-center gap-4 font-mono text-xs">
            <span class="text-emerald-400 flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span> AES-256 SECURED</span>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto p-6 flex flex-col lg:flex-row gap-6 max-w-7xl mx-auto w-full">
        
        <section class="flex-[2] flex flex-col gap-4">
            <div class="border-b border-slate-700 pb-2 mb-2 flex justify-between items-end">
                <h2 class="font-mono text-lg text-slate-200">VAULT_DIRECTORY</h2>
                <span class="font-mono text-xs text-cyan-400 bg-cyan-400/10 px-2 py-1 rounded">ACCESS LOG: CLEAR</span>
            </div>
            
            <div class="flex flex-col gap-3" id="vault-list">
                <div class="bg-[#1E293B] border border-slate-700/50 rounded-lg p-4 flex items-center justify-between hover:border-cyan-400/50 transition-all">
                    <div class="flex items-center gap-4">
                        <div class="text-cyan-400 text-2xl font-mono">[-]</div>
                        <div>
                            <h3 class="font-mono text-cyan-400 text-sm">Geran_Tanah_Kampung.enc</h3>
                            <p class="text-[10px] font-mono text-slate-500">Hash: 8f4a...2c1b | Size: 2.4MB</p>
                        </div>
                    </div>
                    <button class="text-xs font-mono text-slate-400 hover:text-emerald-400 bg-[#0F172A] border border-slate-600 px-3 py-1 rounded">> DECRYPT</button>
                </div>

                <div class="bg-[#1E293B] border border-slate-700/50 rounded-lg p-4 flex items-center justify-between hover:border-cyan-400/50 transition-all">
                    <div class="flex items-center gap-4">
                        <div class="text-amber-400 text-2xl font-mono">[$]</div>
                        <div>
                            <h3 class="font-mono text-amber-400 text-sm">Bajet_Keluarga_2026.csv</h3>
                            <p class="text-[10px] font-mono text-slate-500">Hash: 3d9e...1a4f | Last Modified: Today</p>
                        </div>
                    </div>
                    <button class="text-xs font-mono text-slate-400 hover:text-emerald-400 bg-[#0F172A] border border-slate-600 px-3 py-1 rounded">> DECRYPT</button>
                </div>
            </div>
        </section>

        <aside class="flex-[1] flex flex-col gap-4">
            <div class="border-b border-slate-700 pb-2 mb-2">
                <h2 class="font-mono text-lg text-slate-200">ENCRYPT_DATA</h2>
            </div>
            
            <div class="bg-black/40 border border-slate-700/50 rounded-lg p-5 shadow-lg flex flex-col h-full relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-cyan-400/50 to-transparent"></div>
                
                <form id="vault-form" class="flex flex-col gap-4 flex-1">
                    <div class="flex flex-col gap-1">
                        <label class="font-mono text-xs text-slate-400">FILENAME</label>
                        <input type="text" id="v-name" required placeholder="e.g. Polisi_Insurans.pdf" class="bg-[#0F172A] border border-slate-600 rounded p-2 text-sm text-cyan-400 font-mono outline-none focus:border-cyan-400/50">
                    </div>
                    
                    <div class="flex flex-col gap-1">
                        <label class="font-mono text-xs text-slate-400">ACCESS_LEVEL</label>
                        <select id="v-level" class="bg-[#0F172A] border border-slate-600 rounded p-2 text-sm text-emerald-400 font-mono outline-none focus:border-cyan-400/50">
                            <option value="ALL_MEMBERS">ALL FAMILY MEMBERS</option>
                            <option value="ADMIN_ONLY">ADMIN ONLY (PARENTS)</option>
                        </select>
                    </div>

                    <div class="mt-auto pt-4">
                        <button type="submit" class="w-full bg-slate-800 hover:bg-slate-700 border border-slate-600 hover:border-cyan-400 text-cyan-400 font-mono text-sm py-2 rounded transition-all">> INITIATE_ENCRYPTION</button>
                    </div>
                </form>

                <div id="vault-log" class="mt-4 pt-4 border-t border-slate-700/50 font-mono text-[10px] text-slate-500 min-h-[60px]">
                    // Vault locked. Awaiting input.
                </div>
            </div>
        </aside>
    </main>
    <script src="js/core.js"></script>
    <script src="js/family.js"></script>
</body>
</html>
