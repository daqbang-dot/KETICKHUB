<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUTH_GATE | KETICK HUB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/globals.css">
    <style>
        .scanline {
            width: 100%; height: 2px;
            background: rgba(52, 211, 153, 0.1);
            position: absolute;
            animation: scan 4s linear infinite;
        }
        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }
    </style>
</head>
<body class="bg-[#020617] text-slate-300 font-mono h-screen flex items-center justify-center overflow-hidden page-fade-in">
    <div class="scanline"></div>

    <div class="w-full max-w-md p-8 bg-[#0F172A] border border-slate-800 rounded-lg shadow-2xl relative z-10">
        <div class="text-center mb-8">
            <h1 class="text-amber-400 font-bold text-2xl tracking-[0.3em]">KETICK_HUB</h1>
            <p class="text-[10px] text-slate-500 mt-2">ENCRYPTED_SESSION_REQUIRED</p>
        </div>

        <div id="terminal-auth" class="space-y-4">
            <div id="auth-logs" class="text-[11px] h-32 overflow-y-auto mb-4 p-2 bg-black/30 rounded border border-slate-800/50 text-slate-500">
                <div>[SYSTEM] Initializing security protocols...</div>
                <div>[SYSTEM] Awaiting credentials_</div>
            </div>

            <form id="login-form" class="space-y-4">
                <div>
                    <label class="text-[10px] text-emerald-500">ACCESS_ID</label>
                    <input type="text" id="access-id" required autofocus
                        class="w-full bg-[#020617] border border-slate-700 p-3 rounded outline-none focus:border-emerald-500 text-emerald-400 transition-all">
                </div>
                <div>
                    <label class="text-[10px] text-emerald-500">SECURITY_KEY</label>
                    <input type="password" id="security-key" required
                        class="w-full bg-[#020617] border border-slate-700 p-3 rounded outline-none focus:border-emerald-500 text-emerald-400 transition-all">
                </div>
                <button type="submit" 
                    class="w-full bg-emerald-600/10 border border-emerald-500/50 hover:bg-emerald-500 hover:text-[#020617] p-3 rounded font-bold transition-all duration-300 uppercase tracking-widest text-emerald-400 text-sm">
                    Establish_Connection
                </button>
            </form>
        </div>
    </div>

    <script src="js/core.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
